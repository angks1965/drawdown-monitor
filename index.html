<script>
const INDICES = [
  { t:'^DJI',  yahoo:'^DJI',  label:'Dow Jones',  desc:'Dow Jones Industrial Average',  ath:45073.63 },
  { t:'^IXIC', yahoo:'^IXIC', label:'NASDAQ',      desc:'Nasdaq Composite Index',         ath:22222.61 },
  { t:'^GSPC', yahoo:'^GSPC', label:'S&P 500',     desc:'S&P 500 Index',                  ath:6147.43  },
];

const ETFS = [
  { t:'VOO',  label:'VOO',  desc:'Vanguard S&P 500 ETF',           ath:566.56 },
  { t:'SCHD', label:'SCHD', desc:'Schwab US Dividend Equity ETF',   ath:31.50  },
  { t:'VXUS', label:'VXUS', desc:'Vanguard Total Intl Stock ETF',   ath:71.20  },
  { t:'URTH', label:'URTH', desc:'iShares MSCI World ETF',          ath:230.50 },
  { t:'IGV',  label:'IGV',  desc:'iShares Expanded Tech-SW ETF',    ath:130.00 },
  { t:'SMH',  label:'SMH',  desc:'VanEck Semiconductor ETF',        ath:340.00 },
  { t:'SOXX', label:'SOXX', desc:'iShares Semiconductor ETF',       ath:325.00 },
  { t:'XLE',  label:'XLE',  desc:'Energy Select Sector SPDR',       ath:110.50 },
  { t:'XLP',  label:'XLP',  desc:'Consumer Staples Select SPDR',    ath:92.50  },
];

const KEY_STORE = 'finnhub_key_ddm_v4';
const ATH_STORE = 'ath_values_ddm_v8';

const ALL = [...INDICES, ...ETFS];
const $ = id => document.getElementById(id); const log = msg => { const d=$('diag'); d.textContent+=msg+'\n'; d.scrollTop=d.scrollHeight; };

function loadATHStore(){
  try { const r=localStorage.getItem(ATH_STORE); if(r) return JSON.parse(r); } catch(e){}
  const init={};
  ALL.forEach(s => init[s.t]={value:s.ath, source:'manual'});
  return init;
}
function saveATHStore(store){ localStorage.setItem(ATH_STORE,JSON.stringify(store)); } let athStore=loadATHStore(); let lastPrices={};

window.addEventListener('DOMContentLoaded',()=>{
  const saved=localStorage.getItem(KEY_STORE);
  if(saved) $('apikey').value=saved;
  if(!saved){
    const fallbacks=['finnhub_key_ddm_v7','finnhub_key_ddm_v6','finnhub_key_ddm_v5'];
    for(const k of fallbacks){
      const v=localStorage.getItem(k);
      if(v){ $('apikey').value=v; localStorage.setItem(KEY_STORE,v); break; }
    }
  }

  if(location.protocol !== 'https:'){
    $('origin-val').textContent = location.href.slice(0,80);
    $('origin-warn').style.display = 'block';
  }
});

function saveAndLoad(){
  const k=$('apikey').value.trim();
  if(k) localStorage.setItem(KEY_STORE,k);
  loadAll();
}

function ddCls(p){ const a=Math.abs(p); return a<5?'dg':a<15?'dy':a<25?'do':'dr'; } function ddCol(p){ const a=Math.abs(p); return a<5?'#22c55e':a<15?'#eab308':a<25?'#f97316':'#ef4444'; } function hideAlerts(){ ['aerr','aok','awarn','ainfo'].forEach(id=>$(id).style.display='none'); } function showAlert(id,html){ hideAlerts(); $(id).innerHTML=html; $(id).style.display='block'; }

function renderATHCell(t){
  const e=athStore[t]||{value:0,source:'manual'};
  let srcCls,srcLabel,srcTitle;
  if(e.source==='live'){    srcCls='src-live';      srcLabel='new high!'; srcTitle='Price exceeded previous ATH — auto-updated.'; }
  else if(e.source==='suggested'){ srcCls='src-suggested'; srcLabel='52w high'; srcTitle='Auto-filled from 52-week high via Finnhub.'; }
  else {                    srcCls='src-manual';    srcLabel='manual';    srcTitle='Manually set. Click Suggest ATH to auto-fill.'; }
  return `<div class="ath-cell">
    <span class="ath-src ${srcCls}" title="${srcTitle}">${srcLabel}</span>
    <input type="number" step="0.01" class="ath-input${e.source!=='manual'?' auto':''}"
      value="${e.value.toFixed(2)}" onchange="onATHEdit('${t}',this.value)" />
  </div>`;
}

function skRow(t,label,desc,isIdx){
  return `<tr data-t="${t}">
    <td><span class="rd spin" id="dot-${t.replace(/[^a-zA-Z0-9]/g,'_')}"></span></td>
    <td><div class="tkw"><div class="tkico${isIdx?' idx':''}">${label.slice(0,4)}</div>
      <div><div class="tksym">${label}</div><div class="tknm">${desc}</div></div></div></td>
    <td class="r"><span class="sk" style="width:65px"></span></td>
    <td class="r">${renderATHCell(t)}</td>
    <td class="r"><span class="sk" style="width:72px"></span></td>
    <td><div class="bw"><div class="bt"><div class="bf" style="width:0;background:#333"></div></div>
      <span class="sk" style="width:30px"></span></div></td></tr>`;
}

function fillDrawdown(t,price,ath){
  const row=document.querySelector(`tr[data-t="${t}"]`); if(!row) return null;
  const pct=((price-ath)/ath)*100, cls=ddCls(pct), col=ddCol(pct);
  const bw=Math.min(Math.abs(pct)/40*100,100).toFixed(1);
  row.cells[4].innerHTML=`<span class="dd ${cls}">${pct.toFixed(2)}%</span>`;
  row.cells[5].innerHTML=`<div class="bw"><div class="bt"><div class="bf" style="width:${bw}%;background:${col}"></div></div><span class="bp">${Math.abs(pct).toFixed(1)}%</span></div>`;
  return pct;
}

function fillRow(t,price,ath){
  const row=document.querySelector(`tr[data-t="${t}"]`); if(!row) return null;
  const safeId = 'dot-' + t.replace(/[^a-zA-Z0-9]/g, '_');
  const el = $(safeId);
  if(el) el.className='rd ok';
  row.cells[2].innerHTML=`<span style="font-size:14px;font-weight:600;font-variant-numeric:tabular-nums">$${price.toFixed(2)}</span>`;
  row.cells[3].innerHTML=renderATHCell(t);
  return fillDrawdown(t,price,ath);
}

function errRow(t,reason){
  const row=document.querySelector(`tr[data-t="${t}"]`); if(!row) return;
  const safeId = 'dot-' + t.replace(/[^a-zA-Z0-9]/g, '_');
  const el = $(safeId);
  if(el) el.className='rd err';
  row.cells[2].innerHTML=`<span style="color:var(--muted)">—</span>`;
  row.cells[3].innerHTML=renderATHCell(t);
  row.cells[4].innerHTML=`<span class="dd dn" style="font-size:11px">${reason||'N/A'}</span>`;
  row.cells[5].innerHTML=`<div class="bw"><div class="bt"><div class="bf" style="width:0;background:#333"></div></div></div>`;
}

function onATHEdit(t,val){
  const num=parseFloat(val); if(!isFinite(num)||num<=0) return;
  if(lastPrices[t]&&num<lastPrices[t]){
    athStore[t]={value:lastPrices[t],source:'live'}; saveATHStore(athStore);
    const row=document.querySelector(`tr[data-t="${t}"]`);
    if(row) row.cells[3].innerHTML=renderATHCell(t);
    fillDrawdown(t,lastPrices[t],lastPrices[t]);
    showAlert('awarn',`ATH for ${t} can't be below current price — set to current price (drawdown = 0%).`);
    return;
  }
  athStore[t]={value:num,source:'manual'}; saveATHStore(athStore);
  const row=document.querySelector(`tr[data-t="${t}"]`);
  if(row) row.cells[3].innerHTML=renderATHCell(t);
  if(lastPrices[t]) fillDrawdown(t,lastPrices[t],num);
  rebuildSummary();
}

function rebuildSummary(){
  const results=ALL.map(s=>{
    if(!lastPrices[s.t]) return {t:s.t,pct:null};
    const ath=athStore[s.t]?.value||s.ath;
    return {t:s.t,pct:((lastPrices[s.t]-ath)/ath)*100};
  });
  updateSummary(results);
}

function updateSummary(results){
  const v=results.filter(r=>r.pct!==null); if(!v.length) return;
  const deep=v.reduce((a,b)=>b.pct<a.pct?b:a);
  const shal=v.reduce((a,b)=>b.pct>a.pct?b:a);
  const avg=v.reduce((s,r)=>s+r.pct,0)/v.length;
  $('sd').textContent=deep.pct.toFixed(2)+'%'; $('sdn').textContent=deep.t;
  $('ss').textContent=shal.pct.toFixed(2)+'%'; $('ssn').textContent=shal.t;
  $('sa').textContent=avg.toFixed(2)+'%';
  $('sc').textContent=v.filter(r=>r.pct<-0.15).length;
}

async function fetchIndex(yahooSymbol){
  // Switched to option chain endpoint which provides reliable, lightweight quote metadata
  const yUrl = `https://query1.finance.yahoo.com/v7/finance/options/${encodeURIComponent(yahooSymbol)}`;
  const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(yUrl)}`;
  log(`→ ${yahooSymbol} via allorigins+Yahoo…`);
  
  const res = await fetch(proxyUrl, {signal: AbortSignal.timeout(12000)});
  log(`  ${yahooSymbol}: HTTP ${res.status}`);
  if(!res.ok) throw new Error(`proxy_http_${res.status}`);
  
  const wrapper = await res.json();
  if(!wrapper.contents) throw new Error('no_proxy_contents');
  
  // Handle strings vs already parsed objects gracefully
  const data = typeof wrapper.contents === 'string' ? JSON.parse(wrapper.contents) : wrapper.contents;
  const quote = data?.optionChain?.result?.[0]?.quote;
  if(!quote) throw new Error('no_quote_data');
  
  const level = quote.regularMarketPrice ?? quote.previousClose;
  if(!level || level <= 0) throw new Error('no_level');
  
  log(`  ${yahooSymbol}: level=${level}`);
  return level;
}

async function fetchOne(ticker, apiKey){
  const url=`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${apiKey}`;
  log(`→ ${ticker}…`);
  const res=await fetch(url);
  log(`  ${ticker}: HTTP ${res.status}`);
  if(res.status===401) throw new Error('invalid_key');
  if(res.status===403) throw new Error('forbidden');
  if(res.status===429) throw new Error('rate_limited');
  if(!res.ok) throw new Error(`http_${res.status}`);
  const d=await res.json();
  log(`  ${ticker}: c=${d.c} pc=${d.pc}`);
  const price=(d.c&&d.c>0)?d.c:d.pc;
  if(!price||price<=0) throw new Error('no_price');
  return price;
}

async function fetchSuggestedATH(ticker, apiKey){
  const url=`https://finnhub.io/api/v1/stock/metric?symbol=${ticker}&metric=price&token=${apiKey}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error(`http_${res.status}`);
  const d=await res.json();
  const high=d?.metric?.['52WeekHigh'];
  if(!high||high<=0) throw new Error('no_52w_high');
  return high;
}

async function testConnection(){
  const apiKey=($('apikey').value.trim())||localStorage.getItem(KEY_STORE)||'';
  const btn=$('testbtn');
  hideAlerts(); $('diag').textContent=''; $('diag').style.display='block';
  btn.disabled=true;

  log('── Connection Test ───────────────────────────────');
  log(`Time:     ${new Date().toISOString()}`);
  log(`Origin:   ${location.origin}`);
  log(`Protocol: ${location.protocol}`);
  log(`Key:      ${apiKey?apiKey.slice(0,8)+'…'+apiKey.slice(-4)+' ('+apiKey.length+' chars)':'(EMPTY)'}`);
  log('');

  if(!apiKey){
    log('FAIL: No API key.'); showAlert('aerr','<strong>No API key found.</strong> Paste your Finnhub key above.');
    btn.disabled=false; return;
  }

  log('Test: Fetching VOO…');
  try{
    const url=`https://finnhub.io/api/v1/quote?symbol=VOO&token=${apiKey}`;
    log(`URL: ${url.replace(apiKey,'***')}`);
    const res=await fetch(url);
    log(`HTTP: ${res.status}`);
    const text=await res.text();
    log(`Body: ${text.slice(0,300)}`);
    if(res.ok){
      const d=JSON.parse(text);
      const price=(d.c&&d.c>0)?d.c:d.pc;
      if(price>0){
        log(`✓ VOO = $${price}`);
        showAlert('aok',`&#x2713; <strong>Connected!</strong> VOO = $${price.toFixed(2)}. Click <strong>Apply &amp; Load</strong> to fetch all 14 symbols.`);
        $('diag').style.display='none';
      } else {
        log(`✗ Got price=0 — market may be closed. pc=${d.pc}`);
        showAlert('awarn',`Key works but price=0 — market is likely closed. Previous close: $${d.pc}. Try Apply & Load anyway.`);
      }
    } else {
      if(res.status===401) showAlert('aerr','<strong>HTTP 401 — Key rejected.</strong> Check your key at <a href="https://finnhub.io/dashboard" target="_blank">finnhub.io/dashboard</a>.');
      else if(res.status===403) showAlert('aerr',`<strong>HTTP 403 — Forbidden.</strong> Body: <code>${text.slice(0,80)}</code><br>Try a different network or wait 60 seconds (rate limit).`);
      else if(res.status===429) showAlert('awarn','<strong>HTTP 429 — Rate limited.</strong> Wait 60 seconds then try again.');
      else showAlert('aerr',`<strong>HTTP ${res.status}.</strong> <code>${text.slice(0,100)}</code>`);
    }
  } catch(e){
    log(`✗ Network error: ${e.message}`);
    showAlert('aerr',`<strong>Network error: ${e.message}</strong><br>`
      +`Make sure you are on <code>https://</code> — not <code>file://</code> or <code>edge://external-file</code>.<br>`
      +`Current origin: <code>${location.origin}</code>`);
  }
  btn.disabled=false;
}

async function suggestATH(){
  const apiKey=($('apikey').value.trim())||localStorage.getItem(KEY_STORE)||'';
  const btn=$('suggbtn');
  if(!apiKey){ showAlert('aerr','<strong>API key required.</strong> Enter your key first.'); return; }
  btn.disabled=true; $('diag').style.display='block';
  log('\n── Suggest ATH ─────────────────────────────────');
  let updated=0, failed=0;

  for(const s of ALL){
    try{
      const high=await fetchSuggestedATH(s.t,apiKey);
      const price=lastPrices[s.t]||0;
      const candidate=Math.max(high,price);
      const source=price>=high?'live':'suggested';
      const current=athStore[s.t]?.value||0;
      if(candidate>current||athStore[s.t]?.source!=='manual'){
        athStore[s.t]={value:candidate,source};
        updated++;
        const row=document.querySelector(`tr[data-t="${s.t}"]`);
        if(row){ row.cells[3].innerHTML=renderATHCell(s.t); if(lastPrices[s.t]) fillDrawdown(s.t,lastPrices[s.t],candidate); }
        log(`  ${s.t}: ATH → $${candidate.toFixed(2)} [${source}]`);
      } else { log(`  ${s.t}: no update (stored $${current.toFixed(2)} >= suggested $${candidate.toFixed(2)})`); }
    } catch(e){ log(`  ${s.t}: failed — ${e.message}`); failed++; }
    await new Promise(r=>setTimeout(r,130));
  }

  saveATHStore(athStore); rebuildSummary();
  showAlert(updated>0?'ainfo':'awarn',
    updated>0
      ?`&#x2713; Updated ${updated} ATH value(s) from 52-week highs.${failed?` (${failed} unavailable on free tier)`:''}`
      :`No updates — ${failed}/${ALL.length} failed. 52-week high data may not be on Finnhub free tier. Edit ATH values manually.`
  );
  $('diag').style.display=failed===ALL.length?'block':'none';
  btn.disabled=false;
}

async function loadAll(){
  const apiKey=($('apikey').value.trim())||localStorage.getItem(KEY_STORE)||'';
  const btn=$('rbtn'),sdot=$('sdot'),stxt=$('stxt'),ts=$('ts');
  hideAlerts(); $('diag').textContent=''; $('diag').style.display='block';

  if(!apiKey){
    sdot.className='err'; stxt.textContent='Key required';
    showAlert('aerr','<strong>No API key.</strong> Paste your Finnhub key and click Apply & Load. Free key at <a href="https://finnhub.io" target="_blank">finnhub.io</a>.');
    $('idxtbody').innerHTML=INDICES.map(s=>skRow(s.t,s.label,s.desc,true)).join('');
    $('etftbody').innerHTML=ETFS.map(s=>skRow(s.t,s.label,s.desc,false)).join('');
    ALL.forEach(s=>errRow(s.t,'no key')); return;
  }

  if(apiKey.length!==40) showAlert('awarn',`⚠ Key is ${apiKey.length} chars — expected 40. Check you copied it completely.`);

  btn.disabled=true; sdot.className='spin'; sdot.style.background=''; stxt.textContent='Fetching…'; ts.textContent='';
  $('idxtbody').innerHTML=INDICES.map(s=>skRow(s.t,s.label,s.desc,true)).join('');
  $('etftbody').innerHTML=ETFS.map(s=>skRow(s.t,s.label,s.desc,false)).join('');
  ['sd','sdn','ss','ssn','sa','sc'].forEach(id=>$(id).textContent='—');

  log(`Key: ${apiKey.slice(0,8)}…${apiKey.slice(-4)} (${apiKey.length} chars)`);
  log(`Origin: ${location.origin} | ${new Date().toISOString()}`);
  log(`Indices (Yahoo via allorigins proxy): ${INDICES.length} | ETFs (Finnhub): ${ETFS.length}`);
  log('─────────────────────────────────────────────────');

  let ok=0,fail=0; const results=[];

  log('\n── Indices (Yahoo Finance via allorigins proxy) ──');
  for(const s of INDICES){
    try{
      const level=await fetchIndex(s.yahoo);
      lastPrices[s.t]=level;
      let ath=athStore[s.t]?.value||s.ath;
      if(level>ath){ ath=level; athStore[s.t]={value:ath,source:'live'}; saveATHStore(athStore); log(`  ${s.label}: new ATH → ${ath.toLocaleString()}`); }
      const row=document.querySelector(`tr[data-t="${s.t}"]`);
      if(row){
        const dotId='dot-'+s.t.replace(/[^a-zA-Z0-9]/g,'_');
        const dotEl=document.getElementById(dotId);
        if(dotEl) dotEl.className='rd ok';
        row.cells[2].innerHTML=`<span style="font-size:14px;font-weight:600;font-variant-numeric:tabular-nums">${level.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span>`;
        row.cells[3].innerHTML=renderATHCell(s.t);
      }
      const pct=fillDrawdown(s.t,level,ath);
      results.push({t:s.t,label:s.label,pct}); ok++;
    } catch(e){
      log(`  ${s.label}: FAILED — ${e.message}`);
      errRow(s.t,e.message); results.push({t:s.t,label:s.label,pct:null}); fail++;
    }
    await new Promise(r=>setTimeout(r,400));
  }

  log('\n── ETFs via Finnhub ──');
  for(const s of ETFS){
    try{
      const price=await fetchOne(s.t,apiKey);
      lastPrices[s.t]=price;
      let ath=athStore[s.t]?.value||s.ath;
      if(price>ath){ ath=price; athStore[s.t]={value:ath,source:'live'}; saveATHStore(athStore); log(`  ${s.t}: new ATH → $${ath.toFixed(2)}`); }
      const pct=fillRow(s.t,price,ath);
      results.push({t:s.t,label:s.t,pct}); ok++;
    } catch(e){
      log(`  ${s.t}: FAILED — ${e.message}`);
      errRow(s.t,e.message); results.push({t:s.t,label:s.t,pct:null}); fail++;
      if(e.message==='invalid_key'||e.message==='forbidden'){
        for(const rem of ETFS.slice(ETFS.findIndex(x=>x.t===s.t)+1)){
          errRow(rem.t,'skipped'); results.push({t:rem.t,label:rem.t,pct:null}); fail++;
        }
        showAlert('aerr',`<strong>Key rejected (${e.message}).</strong> Go to <a href="https://finnhub.io/dashboard" target="_blank">finnhub.io/dashboard</a>, copy your key, paste above.`);
        break;
      }
    }
    await new Promise(r=>setTimeout(r,130));
  }

  updateSummary(results);
  const now=new Date();
  const lbl=now.toLocaleDateString('en-SG',{day:'2-digit',month:'short',year:'numeric'})+'  '+now.toLocaleTimeString('en-SG',{hour:'2-digit',minute:'2-digit'});
  sdot.className=''; sdot.style.background=ok>0?'#22c55e':'#ef4444';
  const total=INDICES.length+ETFS.length;
  stxt.textContent=ok>0?`${ok}/${total} loaded`:'Failed';
  ts.textContent=`Updated: ${lbl} · Indices: Yahoo Proxy · ETFs: Finnhub`;
  log('─────────────────────────────────────────────────');
  log(`Done: ${ok} ok, ${fail} failed`);

  if(ok>0&&fail===0){ showAlert('aok',`&#x2713; All ${ok} symbols loaded (${INDICES.length} indices via Yahoo Proxy + ${ETFS.length} ETFs via Finnhub).`); $('diag').style.display='none'; }
  else if(ok>0&&fail>0){ showAlert('awarn',`${ok} loaded, ${fail} failed. If S&P failed, verify your network settings or try again.`); }
  btn.disabled=false;
}
</script>

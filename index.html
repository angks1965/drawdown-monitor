<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Equity Drawdown Monitor</title> 
<style> 
/* Keeping your existing styles for consistency */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; } :root {
  --bg:#0f1117; --bg2:#1a1d27; --bg3:#1e2435;
  --text:#e8eaf0; --muted:#8891a8; --faint:#2d3555; --border:rgba(255,255,255,0.07);
  --green:#22c55e; --yellow:#eab308; --orange:#f97316; --red:#ef4444;
  --blue:#60a5fa; --accent:#6366f1; --gold:#f59e0b; } body { background:var(--bg); color:var(--text); font-family:sans-serif; min-height:100vh; padding:2rem 1.5rem; } .wrap { max-width:960px; margin:0 auto; }
.keybar { background:var(--bg2); border:1px solid var(--faint); border-radius:10px; padding:14px 16px; margin-bottom:1.25rem; }
.r { text-align:right; } .tbl-section { margin-bottom:1.5rem; } .twrap { border:1px solid var(--border); border-radius:12px; overflow:hidden; }
table { width:100%; border-collapse:collapse; } td { padding:12px 14px; }
</style> 
</head> 
<body> 
<div class="wrap">
  <h1>&#x2193; Equity <em>Drawdown</em> Monitor</h1>
  <div class="keybar">
    <p>Using EODHD for Indices & Finnhub for ETFs.</p>
  </div>

  <div class="tbl-section">
    <div class="section-label">Market Indices (via EODHD)</div>
    <div class="twrap">
      <table>
        <thead><tr><th>Index</th><th class="r">Current level</th></tr></thead>
        <tbody id="idxtbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// 1. Updated INDICES with EODHD symbol mapping
const INDICES = [
  { t:'^DJI',  eod:'DJI.INDX', label:'Dow Jones',  ath:45073.63 },
  { t:'^IXIC', eod:'IXIC.INDX', label:'NASDAQ',     ath:22222.61 },
  { t:'^GSPC', eod:'GSPC.INDX', label:'S&P 500',    ath:6147.43  },
];

// 2. New fetchIndex using EODHD
async function fetchIndex(eodSymbol) {
  const EOD_KEY = 'YOUR_EOD_API_KEY_HERE'; // <--- REPLACE THIS
  const url = `https://eodhistoricaldata.com/api/real-time/${eodSymbol}?api_token=${EOD_KEY}&fmt=json`;
  
  const res = await fetch(url);
  if (!res.ok) throw new Error(`EOD_HTTP_${res.status}`);
  const data = await res.json();
  
  if (!data.close) throw new Error('NO_INDEX_DATA');
  return data.close;
}

// 3. Update your loadAll loop to use the new function
async function loadAll() {
  const tbody = document.getElementById('idxtbody');
  tbody.innerHTML = '';
  
  for (const s of INDICES) {
    try {
      const level = await fetchIndex(s.eod);
      const row = `<tr><td>${s.label}</td><td class="r">${level.toFixed(2)}</td></tr>`;
      tbody.innerHTML += row;
    } catch (e) {
      tbody.innerHTML += `<tr><td>${s.label}</td><td class="r">Error</td></tr>`;
    }
  }
}

// Run on load
loadAll();
</script>
</body>
</html>
